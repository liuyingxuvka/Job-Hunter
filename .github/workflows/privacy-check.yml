name: Privacy Audit

on:
  pull_request:
  push:

jobs:
  privacy-audit:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - windows-latest
          - ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run privacy audit
        shell: pwsh
        run: ./scripts/privacy_audit.ps1 -Scope repo
