name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build-windows-package:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Validate tag matches project version
        shell: pwsh
        run: |
          $tagVersion = "${env:GITHUB_REF_NAME}" -replace '^v', ''
          $content = Get-Content .\desktop_app\pyproject.toml -Raw
          $match = [regex]::Match($content, 'version = "(\d+\.\d+\.\d+)"')
          if (-not $match.Success) {
            throw "Could not resolve project version from desktop_app/pyproject.toml"
          }
          $projectVersion = $match.Groups[1].Value
          if ($projectVersion -ne $tagVersion) {
            throw "Release tag version '$tagVersion' does not match project version '$projectVersion'."
          }

      - name: Run privacy audit
        shell: pwsh
        run: ./scripts/privacy_audit.ps1 -Scope repo

      - name: Install desktop build dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r .\desktop_app\requirements-build.txt
          python -m pip install -e .\desktop_app

      - name: Build Windows release package
        shell: pwsh
        run: .\scripts\build_windows_release.ps1

      - name: Upload Windows package artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-release-package
          path: |
            dist/release/*.zip
            dist/release/*.sha256

  create-release:
    runs-on: ubuntu-latest
    needs:
      - build-windows-package

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build release notes from CHANGELOG
        shell: bash
        run: |
          version="${GITHUB_REF_NAME#v}"
          awk -v ver="$version" '
            $0 ~ "^## \\[" ver "\\]" { capture=1; next }
            $0 ~ "^## \\[" && capture { exit }
            capture { print }
          ' CHANGELOG.md > release_notes.md

          if [ ! -s release_notes.md ]; then
            {
              echo "Release $version"
              echo
              echo "See CHANGELOG.md for details."
            } > release_notes.md
          fi

      - name: Download release assets
        uses: actions/download-artifact@v4
        with:
          name: windows-release-package
          path: release-assets

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          body_path: release_notes.md
          files: |
            release-assets/*.zip
            release-assets/*.sha256
